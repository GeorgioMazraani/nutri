<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary SEO -->
    <title>Nutri — Safe Biosecurity Solutions for Farms & Facilities</title>
    <meta
      name="description"
      content="Nutri delivers 100% organic, chemical-free disinfectants for poultry, fisheries, livestock, and warehouses—non-toxic, residue-free, fast-acting protection that supports safer, sustainable hygiene."
    />
    <meta name="theme-color" content="#246b69" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />

    <!-- Canonical -->
    <link rel="canonical" href="https://Nutri.com/" />

    <!-- Language / Region -->
    <meta property="og:locale" content="en_US" />
    <link rel="alternate" href="https://Nutri.com/" hreflang="en" />
    <!-- If you add FR/AR/PT later, uncomment and set correct URLs:
      <link rel="alternate" href="https://Nutri.com/fr/" hreflang="fr" />
      <link rel="alternate" href="https://Nutri.com/ar/" hreflang="ar" />
      <link rel="alternate" href="https://Nutri.com/pt/" hreflang="pt" />
      <link rel="alternate" href="https://Nutri.com/" hreflang="x-default" />
    -->

    <!-- Favicons / App Icons (place files in /public) -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Optional: Windows tiles -->
    <meta name="msapplication-TileColor" content="#246b69" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="Nutri" />
    <meta property="og:title" content="Nutri — Safe Biosecurity Solutions for Farms & Facilities" />
    <meta
      property="og:description"
      content="100% organic, chemical-free biosecurity disinfectants for poultry, fisheries, livestock, and warehouses—non-toxic, residue-free, and designed for sustainable hygiene."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://Nutri.com/" />

    <!-- OG Image (place in /public as 1200x630) -->
    <meta property="og:image" content="https://Nutri.com/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://Nutri.com/og-image.jpg" />
    <meta property="og:image:alt" content="Nutri organic biosecurity disinfectants for farms and facilities" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nutri — Safe Biosecurity Solutions for Farms & Facilities" />
    <meta
      name="twitter:description"
      content="Organic, chemical-free disinfectants for poultry, fisheries, livestock, and warehouses—non-toxic, residue-free, and fast-acting biosecurity protection."
    />
    <meta name="twitter:image" content="https://Nutri.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Nutri organic biosecurity disinfectants for farms and facilities" />

    <!-- Performance hints (optional) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Sitemap (should exist in /public) -->
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

    <!-- Structured Data: Organization + Website -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Nutri",
            "url": "https://Nutri.com/",
            "logo": "https://Nutri.com/logo.png",
            "description": "Nutri delivers 100% organic, chemical-free biosecurity disinfectants for poultry, fisheries, livestock, and warehouses—non-toxic, residue-free, and designed for sustainable hygiene.",
            "brand": {
              "@type": "Brand",
              "name": "Nutri"
            }
          },
          {
            "@type": "WebSite",
            "name": "Nutri",
            "url": "https://Nutri.com/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://Nutri.com/?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>
  </head>

  <body>
    <noscript>
      Nutri provides 100% organic, chemical-free disinfectants for poultry, fisheries, livestock, and warehouse
      environments—non-toxic, residue-free protection that supports sustainable biosecurity.
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
